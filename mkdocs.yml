site_name: "Projeto Final — Engenharia de Dados"
site_description: "Pipeline de dados com arquitetura Medalhão (Landing → Bronze → Silver → Gold) usando PostgreSQL, MinIO, Airflow e Delta Lake."
site_author: "Equipe de Engenharia de Dados — SATC"

repo_url: https://github.com/davinovakoskim-code/projeto-final-eng-dados
repo_name: davinovakoskim-code/projeto-final-eng-dados
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Mudar para o modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Mudar para o modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy        # botão de copiar nos blocos de código
    - content.code.annotate    # anotações dentro do código
    - content.action.edit      # link "editar esta página" -> arquivo no GitHub
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  # >>> Extensão-chave: embute o CÓDIGO REAL do projeto dentro da doc.
  # Uso:  --8<-- "src/01_origem/schema.sql"  (ou com intervalo de linhas :ini:fim)
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Início: index.md
  - Arquitetura: arquitetura.md
  - Camadas do Pipeline:
      - Origem: origem.md
      - Ingestão (Landing → Bronze): ingestao.md
      - Transformação (Silver): transformacao.md
      - Gold (Kimball): gold.md
  - Dashboard: dashboard.md
  - Referências: referencias.md
  - Contribuindo: contribuindo.md
