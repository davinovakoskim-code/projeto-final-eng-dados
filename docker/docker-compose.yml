services:
  minio:
    image: minio/minio:latest
    container_name: minio
    env_file:
      - ../.env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - datalake
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    container_name: minio_createbuckets
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ../.env
    networks:
      - datalake
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/landing;
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      echo 'Buckets criados com sucesso';
      exit 0;
      "

volumes:
  minio_data:
    name: minio_data

networks:
  datalake:
    name: datalake
    driver: bridge
